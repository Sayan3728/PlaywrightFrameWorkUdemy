name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps

      - name: Run tests
        run: python -m pytest tests --alluredir=reports/allure-results -v

      # ✅ NEW STEP: Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # ✅ NEW STEP: Generate Allure Report (HTML)
      - name: Generate Allure Report
        run: allure generate reports/allure-results --clean -o reports/allure-report

      # ✅ Upload RAW results (already you had)
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      # ✅ NEW STEP: Upload HTML report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
